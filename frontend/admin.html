<!DOCTYPE html>
<html lang="pt-BR">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Admin Point Beer</title>

<link rel="stylesheet" href="css/style.css">

<style>

.admin{
max-width:700px;
margin:auto;
background:#1a1a1a;
padding:30px;
border-radius:20px;
}

.admin h1{
text-align:center;
margin-bottom:30px;
color:#f5c518;
}

.admin input,
.admin select{
width:100%;
padding:15px;
margin-bottom:15px;
border:none;
border-radius:10px;
font-size:18px;
}

.admin button{
width:100%;
padding:18px;
border:none;
border-radius:12px;
background:#00ff88;
font-size:22px;
font-weight:bold;
cursor:pointer;
margin-bottom:15px;
}

.lista{
margin-top:30px;
}

.itemAdmin{
background:#111;
padding:15px;
border-radius:10px;
margin-bottom:10px;
}

textarea{
width:100%;
height:300px;
margin-top:20px;
padding:15px;
border-radius:10px;
font-size:16px;
background:#111;
color:white;
}

</style>

</head>

<body>

<div class="admin">

<h1>⚙️ Painel Admin</h1>

<input type="text" id="nome"
placeholder="Nome do produto">

<input type="number" id="preco"
placeholder="Preço">

<select id="categoria">

<option value="cervejas">
🍺 Cervejas
</option>

<option value="refrigerantes">
🥤 Refrigerantes
</option>

<option value="espetinhos">
🍢 Espetinhos
</option>

<option value="jantinhas">
🍛 Jantinhas
</option>

</select>

<input type="text" id="imagem"
placeholder="Nome da imagem">

<button onclick="cadastrarProduto()">
➕ CADASTRAR PRODUTO
</button>

<div class="lista" id="lista"></div>

<h2 style="margin-top:30px;">
📄 produtos.json
</h2>

<textarea id="jsonArea"></textarea>

</div>

<script src="js/admin.js"></script>

</body>

</html>
