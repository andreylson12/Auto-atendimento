<!DOCTYPE html>
<html lang="pt-BR">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>POINT BEER</title>

<link rel="stylesheet" href="frontend/css/style.css">

</head>

<body>

<header>

<h1>🍺 POINT BEER 🍺</h1>

<p>
Autoatendimento Inteligente
</p>

</header>

<div class="categorias">

<button onclick="filtrar('cervejas')">
🍺 Cervejas
</button>

<button onclick="filtrar('refrigerantes')">
🥤 Refrigerantes
</button>

<button onclick="filtrar('espetinhos')">
🍢 Espetinhos
</button>

<button onclick="filtrar('jantinhas')">
🍛 Jantinhas
</button>

<button onclick="renderizarProdutos(produtos)">
🔥 Todos
</button>

</div>

<section class="produtos" id="produtos"></section>

<section class="carrinho">

<h2>🛒 Carrinho</h2>

<div id="itens"></div>

<div id="total">
Total: R$ 0,00
</div>

<div class="pagamentos">

<button class="btnPix" onclick="mostrarPix()">
💳 PIX
</button>

<button class="btnCartao" onclick="mostrarCartao()">
💳 CARTÃO
</button>

<button class="btnDinheiro" onclick="mostrarDinheiro()">
💵 DINHEIRO
</button>

<button onclick="limparCarrinho()">
🗑️ LIMPAR
</button>

</div>

<section class="pix" id="pixArea">

<h2 id="tituloPagamento">
💳 PAGAMENTO
</h2>

<div id="valorPix"></div>

<img src="frontend/imagens/SEU_QR_PIX.png" id="imagemPix">

<p id="mensagemPagamento">
Após pagar mostre o comprovante
</p>

</section>

</section>

<script src="frontend/js/app.js"></script>

</body>

</html>
